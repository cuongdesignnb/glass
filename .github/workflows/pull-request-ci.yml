name: Pull Request CI

on:
  pull_request:
    branches:
      - main
      - perf/baseline-and-quick-wins
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nextjs:
    name: Next.js checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: MITOO
      INTERNAL_API_URL: http://127.0.0.1:8000/api
      API_HOST: ""
      ANALYZE: "false"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Performance contract tests
        run: npm run test:performance

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint -- --quiet

      - name: Production build
        run: npm run build
