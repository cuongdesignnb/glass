server
{
    listen 80;
    listen 443 ssl http2 ;
    server_name kinhmathongnhong.vn www.kinhmathongnhong.vn;
    root /www/wwwroot/kinhmathongnhong.vn/backend/public;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/kinhmathongnhong.vn.conf;
    #CERT-APPLY-CHECK--END
    #SSL-START
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/kinhmathongnhong.vn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/kinhmathongnhong.vn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/kinhmathongnhong.vn.conf;
    #REWRITE-END

    # ===== LARAVEL API - chi PHP cho /api =====
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ===== PHP-FPM (chi xu ly .php, KHONG co location /) =====
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ===== UPLOADS =====
    location ^~ /storage {
        alias /www/wwwroot/kinhmathongnhong.vn/backend/storage/app/public;
        expires 30d;
        try_files $uri $uri/ =404;
    }

    # ===== NEXT.JS FRONTEND port 3222 =====
    location / {
        proxy_pass http://127.0.0.1:3222;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ===== SECURITY =====
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log  /www/wwwlogs/kinhmathongnhong.vn.log;
    error_log  /www/wwwlogs/kinhmathongnhong.vn.error.log;
}
